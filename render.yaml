services:
  - type: web
    name: conectaclaw
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEBAPP_PORT
        value: 3001
      - key: TELEGRAM_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: conectaclaw
      - key: FIREBASE_CLIENT_EMAIL
        value: firebase-adminsdk-fbsvc@conectaclaw.iam.gserviceaccount.com
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_DATABASE_URL
        value: https://conectaclaw.firebaseio.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://conectaclaw.onrender.com/oauth/google/callback
      - key: NOTION_CLIENT_ID
        sync: false
      - key: NOTION_CLIENT_SECRET
        sync: false
      - key: NOTION_REDIRECT_URI
        value: https://conectaclaw.onrender.com/oauth/notion/callback
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_REDIRECT_URI
        value: https://conectaclaw.onrender.com/oauth/github/callback
      - key: JWT_SECRET
        generateValue: true
      - key: WEBAPP_URL
        value: https://conectaclaw.onrender.com
